<template>
    <div class="order-details-page">
        <!-- Loading State -->
        <template if:true={isLoading}>
            <div class="loading-container">
                <lightning-spinner alternative-text="Loading" size="large"></lightning-spinner>
                <p class="loading-text">Loading order details...</p>
            </div>
        </template>

        <!-- Error State -->
        <template if:true={hasError}>
            <div class="error-container">
                <div class="error-content">
                    <div class="error-icon">⚠️</div>
                    <h2>Unable to Load Order</h2>
                    <p class="error-message">{errorMessage}</p>
                    <button class="btn-back" onclick={handleBackToOrders}>
                        ← Back to Orders
                    </button>
                </div>
            </div>
        </template>

        <!-- Main Content -->
        <template if:false={isLoading}>
            <template if:false={hasError}>
                <div class="page-wrapper">
                    <!-- Page Header -->
                    <div class="page-header">
                        <div class="header-content">
                            <button class="btn-back-header" onclick={handleBackToOrders}>← Back</button>
                            <h1 class="page-title">Order Details</h1>
                        </div>
                        <div class="header-actions">
                            <button class="btn-my-account" onclick={handleOpenAccountModal}>
                                👤 My Account
                            </button>
                            <button class="btn-back-top" onclick={handleBackToOrders}>
                                ← Back to Orders
                            </button>
                        </div>
                    </div>

                    <!-- Order Summary Section -->
                    <template if:true={orderDetails}>
                        <div class="order-summary-section">
                            <div class="summary-header">
                                <div class="summary-title">
                                    <h2>Order #{orderDetails.OrderNumber}</h2>
                                    <span class={statusClass}>{orderDetails.Status}</span>
                                </div>
                                <div class="summary-amount">
                                    <h3>{formattedOrderTotal}</h3>
                                    <p>Total Amount</p>
                                </div>
                            </div>

                            <!-- Quick Summary Cards -->
                            <div class="summary-cards">
                                <div class="summary-card">
                                    <span class="card-label">Ordered Date</span>
                                    <span class="card-value">{formattedSelectedCreatedDate}</span>
                                </div>
                                <div class="summary-card">
                                    <span class="card-label">Account</span>
                                    <span class="card-value">{orderDetails.Account.Name}</span>
                                </div>
                                <div class="summary-card">
                                    <span class="card-label">Amount Paid</span>
                                    <span class="card-value">{formattedAmountPaid}</span>
                                </div>
                                <div class="summary-card">
                                    <span class="card-label">Outstanding</span>
                                    <span class="card-value outstanding">{formattedOutstandingAmount}</span>
                                </div>
                            </div>
                        </div>

                        <!-- Payment Summary Section -->
                        <div class="payment-summary-section">
                            <div class="summary-header">
                                <h3 class="section-title">💳 Payment Summary</h3>
                                <template if:true={formattedPaymentHistory.length}>
                                    <button 
                                        class="btn-payment-history" 
                                        onclick={handleTogglePaymentHistory}>
                                        <template if:true={showPaymentHistory}>Hide History</template>
                                        <template if:false={showPaymentHistory}>Payment History</template>
                                    </button>
                                </template>
                            </div>
                            <div class="payment-summary-grid">
                                <div class="payment-summary-item">
                                    <span class="payment-label">Total Amount:</span>
                                    <span class="payment-value">{formattedOrderTotal}</span>
                                </div>
                                <div class="payment-summary-item">
                                    <span class="payment-label">Amount Paid:</span>
                                    <span class="payment-value">{formattedAmountPaid}</span>
                                </div>
                                <div class="payment-summary-item">
                                    <span class="payment-label">Outstanding:</span>
                                    <span class="payment-value outstanding">{formattedOutstandingAmount}</span>
                                </div>
                            </div>
                            
                            <!-- Payment History Table -->
                            <template if:true={showPaymentHistory}>
                                <template if:true={formattedPaymentHistory.length}>
                                    <div class="payment-history-table">
                                        <div class="table-header">
                                            <div class="col-date">Payment Date</div>
                                            <div class="col-method">Method</div>
                                            <div class="col-amount">Amount</div>
                                            <div class="col-status">Status</div>
                                        </div>
                                        <template for:each={formattedPaymentHistory} for:item="payment">
                                            <div key={payment.Id} class="table-row">
                                                <div class="col-date">{payment.formattedPaymentDate}</div>
                                                <div class="col-method">{payment.Payment_Mode__c}</div>
                                                <div class="col-amount">{payment.formattedAmount}</div>
                                                <div class="col-status">{payment.Payment_Status__c}</div>
                                            </div>
                                        </template>
                                    </div>
                                </template>
                            </template>
                            
                            <!-- Payment Actions -->
                            <template if:true={shouldShowPaymentButton}>
                                <button class="btn-payment" onclick={handleOpenPaymentModal}>
                                    💳 Make Payment
                                </button>
                            </template>
                            <template if:false={shouldShowPaymentButton}>
                                <template if:true={isOrderFulfilled}>
                                    <div class="payment-success-message">
                                        <span class="success-icon">✓</span>
                                        <span class="success-text">Your payment has been completed for this Order</span>
                                    </div>
                                </template>
                            </template>
                        </div>

                        <!-- Line Items Section -->
                        <template if:true={formattedLineItems.length}>
                            <div class="line-items-section">
                                <h3 class="section-title">📦 Order Items ({formattedLineItems.length})</h3>
                                <div class="line-items-table">
                                    <div class="table-header">
                                        <div class="col-product">Product</div>
                                        <div class="col-code">Code</div>
                                        <div class="col-qty">Qty</div>
                                        <div class="col-price">Unit Price</div>
                                        <div class="col-total">Total</div>
                                    </div>
                                    <template for:each={formattedLineItems} for:item="item">
                                        <div key={item.Id} class="table-row">
                                            <div class="col-product">{item.Product2.Name}</div>
                                            <div class="col-code">{item.Product2.ProductCode}</div>
                                            <div class="col-qty">{item.Quantity}</div>
                                            <div class="col-price">{item.formattedUnitPrice}</div>
                                            <div class="col-total">{item.formattedTotalPrice}</div>
                                        </div>
                                    </template>
                                </div>
                            </div>
                        </template>

                        <!-- Sections 4-6: Shipping Address, Tracking Status, and Map (Grouped Together) -->
                        <div class="logistics-section-wrapper">
                            <!-- Left Column: Tracking Status and Map -->
                            <div class="logistics-left-column">
                                <!-- Tracking Status Section -->
                                <div class="tracking-status-section">
                                    <h3 class="section-title">📍 Tracking Status</h3>
                                    <div class="tracking-timeline">
                                        <!-- Stage 1: Ordered -->
                                        <div class="tracking-stage">
                                            <div class={trackedOrderedStageIcon}>
                                                <span class="icon-text">✓</span>
                                            </div>
                                            <div class="tracking-info">
                                                <div class="stage-title">Ordered Date</div>
                                                <div class="stage-date">{formattedSelectedCreatedDate}</div>
                                            </div>
                                        </div>

                                        <!-- Stage 2: Order Activated -->
                                        <div class="tracking-stage">
                                            <div class={trackedActivatedStageIcon}>
                                                <template if:true={orderActivatedDate}>
                                                    <span class="icon-text">✓</span>
                                                </template>
                                                <template if:false={orderActivatedDate}>
                                                    <span class="icon-text">○</span>
                                                </template>
                                            </div>
                                            <div class="tracking-info">
                                                <div class="stage-title">Order Activated</div>
                                                <div class="stage-date">{orderActivatedDate}</div>
                                            </div>
                                        </div>

                                        <!-- Stage 3: Payment Status -->
                                        <div class="tracking-stage">
                                            <div class={trackedPaymentStageIcon}>
                                                <template if:true={isOrderFulfilled}>
                                                    <span class="icon-text">✓</span>
                                                </template>
                                                <template if:false={isOrderFulfilled}>
                                                    <span class="icon-text">●</span>
                                                </template>
                                            </div>
                                            <div class="tracking-info">
                                                <div class="stage-title">Payment Status</div>
                                                <div class="stage-date">{paymentStatusText}</div>
                                                <div class={paymentStatusBadgeClass}>{paymentStatusBadge}</div>
                                            </div>
                                        </div>

                                        <!-- Stage 4: Delivery Status -->
                                        <div class="tracking-stage">
                                            <div class={trackedDeliveryStageIcon}>
                                                <span class="icon-text">○</span>
                                            </div>
                                            <div class="tracking-info">
                                                <div class="stage-title">Delivery Status</div>
                                                <div class="stage-date">{deliveryStatusText}</div>
                                                <div class={deliveryStatusBadgeClass}>{deliveryStatusBadge}</div>
                                            </div>
                                        </div>
                                    </div>
                                </div>

                                <!-- Delivery Location Map Component -->
                                <div class="map-section">
                                    <h3 class="section-title">📍 Live Tracking</h3>
                                    <c-delivery-location-map order-status={orderDetails.Status} activated-date={orderDetails.Order_Activated_Date__c} ondeliverydatecalculated={handleDeliveryDateCalculated}></c-delivery-location-map>
                                </div>
                            </div>

                            <!-- Right Column: Shipping Address -->
                            <div class="logistics-right-column">
                                <!-- Estimated Delivery Card / Delayed Order Card -->
                                <template if:false={isDeliveryDelayed}>
                                    <div class="estimated-delivery-card">
                                        <h3 class="estimated-delivery-title">📦 ESTIMATED DELIVERY</h3>
                                        
                                        <template if:false={isOrderActivated}>
                                            <div class="estimated-date">Pending</div>
                                            <p class="estimated-subtitle">Your order is being processed. Once it's activated, the estimated delivery date will be calculated and displayed here. Please wait for confirmation.</p>
                                        </template>
                                        
                                        <template if:true={isOrderActivated}>
                                            <template if:true={deliveryDateCalculated}>
                                                <div class="estimated-date">{deliveryDateCalculated}</div>
                                                <p class="estimated-subtitle">Your order is currently moving through our network and is expected to arrive within the timeframe.</p>
                                            </template>
                                            <template if:false={deliveryDateCalculated}>
                                                <div class="estimated-date">Calculating...</div>
                                                <p class="estimated-subtitle">Your order has been activated. The delivery date is being calculated based on the shipping route and current logistics.</p>
                                            </template>
                                        </template>
                                    </div>
                                </template>

                                <!-- Delayed Order Card -->
                                <template if:true={isDeliveryDelayed}>
                                    <!-- Before Case Creation -->
                                    <template if:false={caseHasBeenCreated}>
                                        <div class="delayed-order-card">
                                            <div class="delayed-header">
                                                <div class="delayed-alert-icon">⚠️</div>
                                                <h3 class="delayed-title">ORDER HAS BEEN DELAYED</h3>
                                            </div>
                                            <div class="delayed-content">
                                                <p class="delayed-message">We are working diligently to complete your delivery at the earliest possible time.</p>
                                                <p class="delayed-message">If you have already raised a support case regarding this order, please use your existing Case Number for all further communication with Customer Support.</p>
                                                <p class="delayed-message">If you have not yet created a case, please click "Raise Support Ticket" to submit a new request so our team can assist you promptly.</p>
                                                <button class="btn-raise-ticket" onclick={handleRaiseTicket}>
                                                    Raise Support Ticket
                                                </button>
                                            </div>
                                        </div>
                                    </template>

                                    <!-- After Case Creation -->
         <template if:true={caseHasBeenCreated}>
    <div class="sct-overlay">
        <div class="sct-popup">

            <!-- Icon -->
            <div class="sct-popup-icon">✓</div>

            <!-- Title -->
            <h3 class="sct-popup-title">Case Submitted Successfully!</h3>
            <p class="sct-popup-message">Thank you for reaching out to our support team.</p>

            <!-- Next Steps -->
            <div class="sct-next-steps">
                <h4 class="sct-next-steps-title">📋 What Happens Next?</h4>
                <div class="sct-step">
                    <div class="sct-step-icon">1</div>
                    <div class="sct-step-text">
                        <span class="sct-step-heading">Agent Assignment</span>
                        <span class="sct-step-desc">A dedicated support agent will be assigned to your case shortly.</span>
                    </div>
                </div>
                <div class="sct-step">
                    <div class="sct-step-icon">2</div>
                    <div class="sct-step-text">
                        <span class="sct-step-heading">Email Notification</span>
                        <span class="sct-step-desc">Your agent will reach out to you via your registered email address.</span>
                    </div>
                </div>
                <div class="sct-step">
                    <div class="sct-step-icon">3</div>
                    <div class="sct-step-text">
                        <span class="sct-step-heading">Issue Resolution</span>
                        <span class="sct-step-desc">Your agent will work with you to fully resolve the issue.</span>
                    </div>
                </div>
            </div>

            <!-- Note -->
            <div class="sct-popup-note">
                <span>💡</span>
                <p>Keep an eye on your registered email inbox for updates from our support team.</p>
            </div>

            <!-- Close Button -->
            <button class="sct-popup-close-btn" onclick={handleCloseSupportTicketModal}>✕ Close</button>
            <p class="sct-popup-countdown">Closing in <strong>{successCountdownSeconds}</strong>s...</p>

        </div>
    </div>
</template>             </template>

                                <!-- Shipping Address Section -->
                                <div class="shipping-address-section">
                                    <div class="address-section-header">
                                        <span class="address-icon">📍</span>
                                        <h3 class="address-section-title">Shipping Address</h3>
                                    </div>
                                    
                                    <template if:true={shippingAddress}>
                                        <div class="address-card">
                                            <!-- Recipient Business -->
                                            <template if:true={shippingAddress.Name}>
                                                <div class="address-block">
                                                    <span class="address-label">RECIPIENT BUSINESS</span>
                                                    <p class="address-value">{shippingAddress.Name}</p>
                                                </div>
                                            </template>

                                            <!-- Mobile -->
                                            <template if:true={shippingAddress.Phone}>
                                                <div class="address-block">
                                                    <span class="address-label">MOBILE</span>
                                                    <p class="address-value">{shippingAddress.Phone}</p>
                                                </div>
                                            </template>

                                            <!-- Address Details -->
                                            <div class="address-block">
                                                <span class="address-label">ADDRESS DETAILS</span>
                                                <div class="address-details">
                                                    <template if:true={shippingAddress.ShippingCity}>
                                                        <span class="detail-text">{shippingAddress.ShippingCity}</span>
                                                    </template>
                                                    <template if:true={shippingAddress.ShippingState}>
                                                        <span class="detail-text">{shippingAddress.ShippingState}</span>
                                                    </template>
                                                    <template if:true={shippingAddress.ShippingPostalCode}>
                                                        <span class="detail-text">{shippingAddress.ShippingPostalCode}</span>
                                                    </template>
                                                    <template if:false={shippingAddress.ShippingCity}>
                                                        <span class="detail-text">-</span>
                                                    </template>
                                                </div>
                                            </div>

                                            <!-- Country -->
                                            <template if:true={shippingAddress.ShippingCountry}>
                                                <div class="address-block">
                                                    <span class="address-label">COUNTRY</span>
                                                    <p class="address-value">{shippingAddress.ShippingCountry}</p>
                                                </div>
                                            </template>

                                            <!-- Full Street Address (Optional Full View) -->
                                            <template if:true={shippingAddress.ShippingStreet}>
                                                <div class="address-block">
                                                    <span class="address-label">STREET ADDRESS</span>
                                                    <p class="address-value address-street">{shippingAddress.ShippingStreet}</p>
                                                </div>
                                            </template>
                                        </div>
                                    </template>
                                    <template if:false={shippingAddress}>
                                        <p class="no-address-message">No shipping address available</p>
                                    </template>
                                </div>
                            </div>
                        </div>

                        <!-- Delayed Delivery Alert (if applicable) -->
                    <!-- <template if:true={isDeliveryDelayed}>
                            <div class="delayed-delivery-alert">
                                <div class="alert-content">
                                    <div class="alert-icon">⚠️</div>
                                    <div class="alert-message">
                                        <div class="alert-title">Delivery Has Been Delayed</div>
                                        <div class="alert-subtitle">For uncertain reasons, we are pushing our limits to deliver your order.</div>
                                        <div class="alert-action"><a href="javascript:void(0)" onclick={handleRaiseTicket}>Raise a Support Ticket →</a></div>
                                    </div>
                                </div>
                            </div>
                        </template> -->

                        <!-- Related Cases Section - ALWAYS VISIBLE -->
                   <div class="related-cases-section">
    <div class="related-cases-header">
        <h3 class="section-title">🎫 Support Cases for This Order</h3>
        <button 
            class="btn-refresh-cases" 
            onclick={handleRefreshCases} 
            title="Refresh the list if your new case is not showing" 
            disabled={isLoadingCases}>
            <template if:true={isLoadingCases}>
                ⏳ Loading...
            </template>
            <template if:false={isLoadingCases}>
                🔄 Refresh
            </template>
        </button>
    </div>

    <!-- Loading State -->
    <template if:true={isLoadingCases}>
        <div class="loading-container">
            <div class="spinner"></div>
            <p>Loading support cases...</p>
        </div>
    </template>

    <!-- Loaded State -->
    <template if:false={isLoadingCases}>

        <!-- Cases Found -->
      <template if:true={hasCases}>
    <p class="refresh-help-text">
        This order has {relatedCases.length} support case(s). Click Refresh to reload the list.
    </p>

    <!-- Action Buttons -->
    <div class="cases-action-bar">
        <button class="btn-refresh-cases" onclick={handleRefreshCases} disabled={isLoadingCases}>
            <template if:true={isLoadingCases}>⏳ Loading...</template>
            <template if:false={isLoadingCases}>🔄 Refresh</template>
        </button>
        <button class="btn-whats-next" onclick={handleWhatsNext}>📋 What's Next?</button>
    </div>

    <!-- Cases Table -->
    <div class="cases-table">
        <div class="table-header">
            <div class="col-case-number">Case Number</div>
            <div class="col-subject">Subject</div>
            <div class="col-description">Description</div>
            <div class="col-status">Status</div>
            <div class="col-date">Created Date</div>
        </div>
        <template for:each={visibleCases} for:item="caseItem">
            <div key={caseItem.Id} class="table-row">
                <div class="col-case-number">
                    <span class="case-badge">{caseItem.CaseNumber}</span>
                </div>
                <div class="col-subject">{caseItem.Subject}</div>
                <div class="col-description">
                    <span class="description-text">{caseItem.Description}</span>
                </div>
                <div class="col-status">
                    <span class="status-badge" data-status={caseItem.Status}>
                        {caseItem.Status}
                    </span>
                </div>
                <div class="col-date">{caseItem.CreatedDate}</div>
            </div>
        </template>
    </div>

    <!-- View More Button -->
    <template if:true={hasMoreCases}>
        <div class="view-more-wrapper">
            <button class="btn-view-more" onclick={handleViewMoreCases}>
                ↓ View All {relatedCases.length} Cases
            </button>
        </div>
    </template>

    <!-- Show Less Button -->
    <template if:true={showingAllCases}>
        <div class="view-more-wrapper">
            <button class="btn-view-more btn-view-less" onclick={handleViewLessCases}>
                ↑ Show Less
            </button>
        </div>
    </template>

</template>

<!-- What's Next Popup -->
<template if:true={showWhatsNextPopup}>
    <div class="wn-overlay" onclick={handleCloseWhatsNext}>
        <div class="wn-popup" onclick={handleWhatsNextPopupClick}>

            <!-- Header -->
            <div class="wn-header">
                <div class="wn-header-left">
                    <span class="wn-header-icon">📋</span>
                    <span class="wn-header-title">What Happens Next?</span>
                </div>
                <button class="wn-close-x" onclick={handleCloseWhatsNext}>✕</button>
            </div>

            <!-- Steps -->
            <div class="wn-body">

                <div class="wn-step">
                    <div class="wn-step-number">1</div>
                    <div class="wn-step-content">
                        <span class="wn-step-heading">Agent Assignment</span>
                        <span class="wn-step-desc">A dedicated support agent will be assigned to your case within 24 hours.</span>
                    </div>
                </div>

                <div class="wn-step">
                    <div class="wn-step-number">2</div>
                    <div class="wn-step-content">
                        <span class="wn-step-heading">Email Notification</span>
                        <span class="wn-step-desc">Your assigned agent will contact you via your registered email address with an update on your case.</span>
                    </div>
                </div>

                <div class="wn-step">
                    <div class="wn-step-number">3</div>
                    <div class="wn-step-content">
                        <span class="wn-step-heading">Investigation</span>
                        <span class="wn-step-desc">Our agent will thoroughly investigate your issue and gather any additional information needed from you.</span>
                    </div>
                </div>

                <div class="wn-step">
                    <div class="wn-step-number">4</div>
                    <div class="wn-step-content">
                        <span class="wn-step-heading">Resolution</span>
                        <span class="wn-step-desc">Your agent will work with you to fully resolve the issue and ensure you are satisfied with the outcome.</span>
                    </div>
                </div>

                <div class="wn-step">
                    <div class="wn-step-number">5</div>
                    <div class="wn-step-content">
                        <span class="wn-step-heading">Case Closure</span>
                        <span class="wn-step-desc">Once the issue is resolved, your case will be marked as closed and a resolution summary will be sent to your email.</span>
                    </div>
                </div>

                <!-- Note -->
                <div class="wn-note">
                    <span class="wn-note-icon">💡</span>
                    <p class="wn-note-text">Keep an eye on your registered email inbox for updates. If you don't hear back within 24 hours, you can raise a new ticket referencing this case.</p>
                </div>

            </div>

            <!-- Close Button -->
            <div class="wn-footer">
                <button class="wn-close-btn" onclick={handleCloseWhatsNext}>✕ Close</button>
            </div>

        </div>
    </div>
</template>

        <!-- No Cases Found -->
        <template if:false={hasCases}>
            <div class="no-cases-message">
                <p class="no-cases-icon">📋</p>
                <p class="no-cases-text">No support cases created for this order yet.</p>
                <p class="no-cases-subtitle">
                    If you encounter any issues with this order, please click "Raise Support Ticket" above to create a case.
                </p>
            </div>
        </template>

    </template>
</div>

                        <!-- Action Buttons -->
                        <div class="page-actions">
                            <button class="btn-secondary" onclick={handleBackToOrders}>
                                ← Back to Orders
                            </button>
                        </div>
                    </template>
                </div>
            </template>
        </template>

        <!-- Account Modal -->
        <template if:true={showAccountModal}>
            <div class="account-modal-overlay" onclick={handleCloseAccountModal}>
                <div class="account-modal-content" onclick={handleAccountModalContentClick}>
                    <!-- Modal Header -->
                    <div class="account-modal-header">
                        <h2>👤 My Account</h2>
                        <button class="close-btn" onclick={handleCloseAccountModal}>✕</button>
                    </div>

                    <!-- Modal Body -->
                    <div class="account-modal-body">
                        <!-- Account Information Section -->
                        <div class="account-section">
                            <h3 class="section-title">Account Information</h3>
                            <div class="info-row">
                                <label class="info-label">Business Name:</label>
                                <span class="info-value">{accountData.BusinessName}</span>
                            </div>
                            <div class="info-row">
                                <label class="info-label">Email:</label>
                                <span class="info-value">{accountData.Email}</span>
                            </div>
                            <div class="info-row">
                                <label class="info-label">Phone:</label>
                                <span class="info-value">{accountData.Phone}</span>
                            </div>
                            <div class="info-row">
                                <label class="info-label">Brand Name:</label>
                                <span class="info-value">{accountData.BrandName}</span>
                            </div>
                        </div>

                        <!-- Shipping Address Section -->
                        <div class="account-section">
                            <div class="section-header">
                                <h3 class="section-title">Shipping Address</h3>
                                <template if:true={canEditAddress}>
                                    <button class="btn-edit" onclick={handleToggleEditMode}>
                                        <template if:true={isEditingAddress}>❌ Cancel</template>
                                        <template if:false={isEditingAddress}>✏️ Edit</template>
                                    </button>
                                </template>
                            </div>

                            <!-- Address Display Mode -->
                            <template if:false={isEditingAddress}>
                                <div class="address-display">
                                    <div class="info-row">
                                        <label class="info-label">Street:</label>
                                        <span class="info-value">{accountData.ShippingStreet}</span>
                                    </div>
                                    <div class="info-row">
                                        <label class="info-label">City:</label>
                                        <span class="info-value">{accountData.ShippingCity}</span>
                                    </div>
                                    <div class="info-row">
                                        <label class="info-label">State:</label>
                                        <span class="info-value">{accountData.ShippingState}</span>
                                    </div>
                                    <div class="info-row">
                                        <label class="info-label">Postal Code:</label>
                                        <span class="info-value">{accountData.ShippingPostalCode}</span>
                                    </div>
                                    <div class="info-row">
                                        <label class="info-label">Country:</label>
                                        <span class="info-value">{accountData.ShippingCountry}</span>
                                    </div>
                                </div>

                                <!-- Message for Activated Orders -->
                                <template if:true={isOrderActivated}>
                                    <div class="address-locked-message">
                                        <p>⚠️ Order has been Activated. To change the shipping address, please raise a support ticket.</p>
                                    </div>
                                </template>
                            </template>

                            <!-- Address Edit Mode -->
                            <template if:true={isEditingAddress}>
                                <div class="address-form">
                                    <div class="form-group">
                                        <label class="form-label">Street</label>
                                        <input 
                                            type="text" 
                                            class="form-input" 
                                            value={accountData.ShippingStreet}
                                            onchange={handleAddressFieldChange}
                                            data-field="ShippingStreet">
                                    </div>
                                    <div class="form-group">
                                        <label class="form-label">City</label>
                                        <input 
                                            type="text" 
                                            class="form-input" 
                                            value={accountData.ShippingCity}
                                            onchange={handleAddressFieldChange}
                                            data-field="ShippingCity">
                                    </div>
                                    <div class="form-group">
                                        <label class="form-label">State</label>
                                        <input 
                                            type="text" 
                                            class="form-input" 
                                            value={accountData.ShippingState}
                                            onchange={handleAddressFieldChange}
                                            data-field="ShippingState">
                                    </div>
                                    <div class="form-group">
                                        <label class="form-label">Postal Code</label>
                                        <input 
                                            type="text" 
                                            class="form-input" 
                                            value={accountData.ShippingPostalCode}
                                            onchange={handleAddressFieldChange}
                                            data-field="ShippingPostalCode">
                                    </div>
                                    <div class="form-group">
                                        <label class="form-label">Country</label>
                                        <input 
                                            type="text" 
                                            class="form-input" 
                                            value={accountData.ShippingCountry}
                                            onchange={handleAddressFieldChange}
                                            data-field="ShippingCountry">
                                    </div>
                                    <button class="btn-save-address" onclick={handleSaveAddress}>
                                        💾 Save Address
                                    </button>
                                </div>
                            </template>
                        </div>
                    </div>
                </div>
            </div>
        </template>
        <template if:true={showPaymentModal}>
            <div class="payment-modal-overlay" onclick={handleClosePaymentModal}>
                <div class="payment-modal-content" onclick={handleModalContentClick}>
                    <!-- Modal Header -->
                    <div class="payment-modal-header">
                        <h2>💳 Make Payment</h2>
                        <button class="close-btn" onclick={handleClosePaymentModal}>✕</button>
                    </div>

                    <!-- Modal Body -->
                    <div class="payment-modal-body">
                        <!-- Payment Summary -->
                        <div class="payment-summary-modal">
                            <h3>Order Summary</h3>
                            <div class="summary-row">
                                <span class="label">Order Amount:</span>
                                <span class="value">{formattedOrderTotal}</span>
                            </div>
                            <div class="summary-row">
                                <span class="label">Amount Paid:</span>
                                <span class="value">{formattedAmountPaid}</span>
                            </div>
                            <div class="summary-row outstanding">
                                <span class="label">Outstanding Amount:</span>
                                <span class="value">{formattedOutstandingAmount}</span>
                            </div>
                        </div>

                        <!-- Payment Method Selection -->
                        <div class="payment-methods-section">
                            <h3>Select Payment Method</h3>
                            <div class="payment-options">
                                <div 
                                    class="payment-option {selectedPaymentMethod === 'Cash' ? 'selected' : ''}" 
                                    data-method="Cash"
                                    onclick={handlePaymentMethodSelect}>
                                    <div class="option-icon">💵</div>
                                    <div class="option-label">Cash</div>
                                </div>

                                <div 
                                    class="payment-option {selectedPaymentMethod === 'UPI' ? 'selected' : ''}" 
                                    data-method="UPI"
                                    onclick={handlePaymentMethodSelect}>
                                    <div class="option-icon">📱</div>
                                    <div class="option-label">UPI</div>
                                </div>

                                <div 
                                    class="payment-option {selectedPaymentMethod === 'Card' ? 'selected' : ''}" 
                                    data-method="Card"
                                    onclick={handlePaymentMethodSelect}>
                                    <div class="option-icon">💳</div>
                                    <div class="option-label">Card</div>
                                </div>

                                <div 
                                    class="payment-option {selectedPaymentMethod === 'Bank Transfer' ? 'selected' : ''}" 
                                    data-method="Bank Transfer"
                                    onclick={handlePaymentMethodSelect}>
                                    <div class="option-icon">🏦</div>
                                    <div class="option-label">Bank Transfer</div>
                                </div>
                            </div>
                        </div>

                        <!-- Payment Form -->
                        <template if:true={showAmountField}>
                            <div class="payment-form-section">
                                <h3>Payment Details</h3>
                                
                                <!-- Amount Field -->
                                <div class="form-group">
                                    <label class="form-label">Amount <span class="required">*</span></label>
                                    <input 
                                        type="number" 
                                        class="form-control" 
                                        placeholder="Enter payment amount"
                                        value={paymentFormData.amount}
                                        data-field="amount"
                                        onchange={handlePaymentFormChange}
                                        step="0.01"
                                        min="0">
                                </div>

                                <!-- Cash Payment Fields -->
                                <template if:true={showCashFields}>
                                    <div class="form-group">
                                        <label class="form-label">Cash Received By <span class="required">*</span></label>
                                        <input 
                                            type="text" 
                                            class="form-control" 
                                            placeholder="Enter name of person who received cash"
                                            value={paymentFormData.cashReceivedBy}
                                            data-field="cashReceivedBy"
                                            onchange={handlePaymentFormChange}>
                                    </div>

                                    <div class="form-group">
                                        <label class="form-label">Cash Receipt Number <span class="required">*</span></label>
                                        <input 
                                            type="text" 
                                            class="form-control" 
                                            placeholder="Enter receipt number"
                                            value={paymentFormData.cashReceiptNumber}
                                            data-field="cashReceiptNumber"
                                            onchange={handlePaymentFormChange}>
                                    </div>

                                    <div class="form-group">
                                        <label class="form-label">Notes</label>
                                        <textarea 
                                            class="form-control" 
                                            placeholder="Additional notes (optional)"
                                            data-field="notes"
                                            onchange={handlePaymentFormChange}
                                            rows="3"></textarea>
                                    </div>
                                </template>

                                <!-- UPI Payment Fields -->
                                <template if:true={showUPIFields}>
                                    <div class="form-group">
                                        <label class="form-label">UPI ID <span class="required">*</span></label>
                                        <input 
                                            type="text" 
                                            class="form-control" 
                                            placeholder="e.g., user@bankname"
                                            value={paymentFormData.upiId}
                                            data-field="upiId"
                                            onchange={handlePaymentFormChange}>
                                    </div>

                                    <div class="form-group">
                                        <label class="form-label">UPI Name <span class="required">*</span></label>
                                        <input 
                                            type="text" 
                                            class="form-control" 
                                            placeholder="Name on UPI account"
                                            value={paymentFormData.upiName}
                                            data-field="upiName"
                                            onchange={handlePaymentFormChange}>
                                    </div>

                                    <div class="form-group">
                                        <label class="form-label">UPI App Name</label>
                                        <input 
                                            type="text" 
                                            class="form-control" 
                                            placeholder="e.g., Google Pay, PhonePe"
                                            value={paymentFormData.upiAppName}
                                            data-field="upiAppName"
                                            onchange={handlePaymentFormChange}>
                                    </div>

                                    <div class="form-group">
                                        <label class="form-label">UPI Reference Number</label>
                                        <input 
                                            type="text" 
                                            class="form-control" 
                                            placeholder="UPI reference number (optional)"
                                            value={paymentFormData.upiReferenceNumber}
                                            data-field="upiReferenceNumber"
                                            onchange={handlePaymentFormChange}>
                                    </div>
                                </template>

                                <!-- Card Payment Fields -->
                                <template if:true={showCardFields}>
                                    <div class="form-group">
                                        <label class="form-label">Card Holder Name <span class="required">*</span></label>
                                        <input 
                                            type="text" 
                                            class="form-control" 
                                            placeholder="Name on card"
                                            value={paymentFormData.cardHolderName}
                                            data-field="cardHolderName"
                                            onchange={handlePaymentFormChange}>
                                    </div>

                                    <div class="form-group">
                                        <label class="form-label">Card Number <span class="required">*</span></label>
                                        <input 
                                            type="text" 
                                            class="form-control" 
                                            placeholder="XXXX XXXX XXXX 1234"
                                            value={paymentFormData.cardNumber}
                                            data-field="cardNumber"
                                            onchange={handlePaymentFormChange}>
                                    </div>

                                    <div class="form-group">
                                        <label class="form-label">Card Type <span class="required">*</span></label>
                                        <select 
                                            class="form-control"
                                            data-field="cardType"
                                            onchange={handlePaymentFormChange}>
                                            <option value="">-- Select Card Type --</option>
                                            <option value="Visa">Visa</option>
                                            <option value="MasterCard">MasterCard</option>
                                            <option value="RuPay">RuPay</option>
                                            <option value="Amex">Amex</option>
                                            <option value="Others">Others</option>
                                        </select>
                                    </div>
                                </template>

                                <!-- Bank Transfer Fields -->
                                <template if:true={showBankTransferFields}>
                                    <div class="form-group">
                                        <label class="form-label">Bank Name <span class="required">*</span></label>
                                        <input 
                                            type="text" 
                                            class="form-control" 
                                            placeholder="Enter bank name"
                                            value={paymentFormData.bankName}
                                            data-field="bankName"
                                            onchange={handlePaymentFormChange}>
                                    </div>

                                    <div class="form-group">
                                        <label class="form-label">Account Number <span class="required">*</span></label>
                                        <input 
                                            type="text" 
                                            class="form-control" 
                                            placeholder="Enter account number"
                                            value={paymentFormData.accountNumber}
                                            data-field="accountNumber"
                                            onchange={handlePaymentFormChange}>
                                    </div>

                                    <div class="form-group">
                                        <label class="form-label">IFSC Code <span class="required">*</span></label>
                                        <input 
                                            type="text" 
                                            class="form-control" 
                                            placeholder="Enter IFSC code"
                                            value={paymentFormData.ifscCode}
                                            data-field="ifscCode"
                                            onchange={handlePaymentFormChange}>
                                    </div>

                                    <div class="form-group">
                                        <label class="form-label">Transfer Reference Number</label>
                                        <input 
                                            type="text" 
                                            class="form-control" 
                                            placeholder="e.g., UTR or Reference Number"
                                            value={paymentFormData.transferReferenceNumber}
                                            data-field="transferReferenceNumber"
                                            onchange={handlePaymentFormChange}>
                                    </div>
                                </template>
                            </div>
                        </template>

                        <!-- Action Buttons -->
                        <div class="payment-modal-actions">
                            <button class="btn-cancel" onclick={handleClosePaymentModal} disabled={isSubmittingPayment}>
                                Cancel
                            </button>
                            <button class="btn-submit-payment" onclick={handlePaymentSubmit} disabled={isSubmittingPayment}>
                                <template if:true={isSubmittingPayment}>
                                    <lightning-spinner alternative-text="Processing"></lightning-spinner>
                                    Processing...
                                </template>
                                <template if:false={isSubmittingPayment}>
                                    💳 Make Payment
                                </template>
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </template>

        <!-- Support Ticket Modal -->
        <template if:true={showSupportTicketModal}>
            <div class="support-ticket-modal-overlay" onclick={handleCloseSupportTicketModal}>
                <div class="support-ticket-modal-content" onclick={handleModalContentClick}>
                    <!-- Modal Header - Hidden on Success -->
                    <template if:false={createdCaseNumber}>
                        <div class="support-ticket-modal-header">
                            <h2>🎫 Raise Support Ticket</h2>
                            <button class="close-btn" onclick={handleCloseSupportTicketModal}>✕</button>
                        </div>
                    </template>

                    <!-- Modal Body -->
                    <div class="support-ticket-modal-body" class:success-mode={createdCaseNumber}>
                        <!-- Success State -->
                       <!--  <template if:true={createdCaseNumber}>
                            <div class="success-container success-popup">
                                <div class="success-icon-wrapper">
                                    <div class="success-icon">✓</div>
                                </div>
                                <h3 class="success-title">Your Case Has Been Successfully Created!</h3>
                                <p class="success-message">Thank you for reaching out. Our support team will prioritize your request and contact you soon.</p>
                                <div class="case-id-display">
                                    <span class="case-id-label">Case Number</span>
                                    <span class="case-id-value">{createdCaseNumber}</span>
                                </div>
                                <p class="success-subtitle">You can reference this case number when communicating with our support team.</p>
                                <div class="success-actions">
                                    <button class="btn btn-primary" onclick={handleViewCaseDetails}>
                                        <span>👁️ View Case Details</span>
                                    </button>
                                    <button class="btn btn-secondary" onclick={handleCloseSupportTicketModal}>
                                        <span>✕ Close</span>
                                    </button>
                                </div>
                                <p class="countdown-text">Closing in <strong>{successCountdownSeconds}</strong>s...</p>
                            </div>
                        </template>-->

                        <!-- Form State -->
                        <template if:false={createdCaseNumber}>
                            <div class="support-ticket-form">
                                <div class="form-group">
                                    <label class="form-label">Subject <span class="required">*</span></label>
                                    <input 
                                        type="text" 
                                        class="form-control" 
                                        placeholder="Enter ticket subject"
                                        value={supportTicketFormData.subject}
                                        data-field="subject"
                                        onchange={handleSupportTicketFieldChange}
                                        maxlength="255">
                                </div>

                                <div class="form-group">
                                    <label class="form-label">Description <span class="required">*</span></label>
                                    <textarea 
                                        class="form-control textarea" 
                                        placeholder="Describe your issue in detail"
                                        value={supportTicketFormData.description}
                                        data-field="description"
                                        onchange={handleSupportTicketFieldChange}
                                        rows="6"></textarea>
                                </div>
                            </div>
                        </template>
                    </div>

                    <!-- Modal Footer -->
                    <template if:false={createdCaseNumber}>
                        <div class="support-ticket-modal-footer">
                            <button class="btn-cancel" onclick={handleCloseSupportTicketModal} disabled={isSubmittingSupportTicket}>
                                Cancel
                            </button>
                            <button class="btn-submit" onclick={handleSubmitSupportTicket} disabled={isSubmittingSupportTicket}>
                                <template if:true={isSubmittingSupportTicket}>
                                    <lightning-spinner alternative-text="Processing"></lightning-spinner>
                                    Submitting...
                                </template>
                                <template if:false={isSubmittingSupportTicket}>
                                    Submit Ticket
                                </template>
                            </button>
                        </div>
                    </template>
                </div>
            </div>
        </template>
    </div>
</template>
